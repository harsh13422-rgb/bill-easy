<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Easy</title>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBD8svV1jNUs0xATAwLMibLAy9zQHlDbIw",
      authDomain: "billeasy-d576d.firebaseapp.com",
      projectId: "billeasy-d576d",
      storageBucket: "billeasy-d576d.firebasestorage.app",
      messagingSenderId: "689159902376",
      appId: "1:689159902376:web:6595236a2859efb5879e9d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
  </script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
    h1 { color: #4CAF50; text-align: center; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    button { background: #4CAF50; color: white; font-weight: bold; border: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bill Easy ✅</h1>
    <p>Firebase Connected Successfully!</p>
    <input type="text" id="item" placeholder="Item name">
    <input type="number" id="amount" placeholder="Amount">
    <button onclick="saveBill()">Save Bill</button>
    <p id="msg"></p>
  </div>

  <script type="module">
    import { collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    
    window.saveBill = async function() {
      const item = document.getElementById('item').value;
      const amount = document.getElementById('amount').value;
      const msg = document.getElementById('msg');
      
      if (!item || !amount) {
        msg.innerText = 'Please fill both fields';
        return;
      }
      
      try {
        await addDoc(collection(window.db, "bills"), {
          item: item,
          amount: Number(amount),
          date: new Date()
        });
        msg.innerText = 'Bill Saved ✅';
        document.getElementById('item').value = '';
        document.getElementById('amount').value = '';
      } catch (e) {
        msg.innerText = 'Error: ' + e.message;
      }
    }
  </script>
</body>
  </html>
